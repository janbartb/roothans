<div class="fullheight flexbox flexcolumn" style="overflow: hidden;">
    <div class="flexgrow1" style="overflow-y: auto;">
        <div class="fullheight flexbox wrap around">
            @for (poule of pouleRonde.poules; track $index) {
                <div class="container flexbox flexmiddle" style="width: 50%;" 
                            [ngClass]="{'onder': $index > 1, 'boven': $index < (pouleRonde.poules.length - 2)}">
                    <div class="sectie poule-view" [ngClass]="{'selected': $index == idxPoule}" (click)="pouleClicked($index)">
                        <div class="sectie-title flexbox flexmiddle flexbetween" style="font-weight: normal; padding: 0 1em;">
                            <div style="font-size: .75em; line-height: 1.2;">
                                <span>Poule <b>{{poule.id}}</b></span>
                            </div>
                            <div style="font-size: .75em; line-height: 1.2;">
                                <span>{{poule.dagNaam}} <b>{{dater.dateReverse(poule.datum)}}</b></span>
                            </div>
                        </div>
                        <div class="sectie-content met-rand flexbox flexmiddle" style="min-height: 4em;">
                            <div style="font-size: .625em; ">
                                <app-ronde-poule-view [poule]="poule" [type]="'only-content'" [allowDelete]="false" [koppelView]="'poule-uitslag'"
                                            [koppelClick]="false" [selected]="$index == idxPoule"></app-ronde-poule-view>
                            </div>
                        </div>
                    </div>
                </div>
            }
        </div>
    </div>
    <div class="flexbox flexcenter flexmiddle" style="min-height: 3em;">
        <div>
            <app-button [button]="btnWeds" [disabled]="idxPoule < 0" (btnClicked)="naarPouleClicked()"></app-button>
        </div>
    </div>
</div>
