<div class="fullheight flexbox flexcolumn">
    <div class="flexgrow1 flexbox flexmiddle">
        <div class="flexbox wrap">
            @for (poule of pouleRonde.poules; track $index) {
                <div class="poule-container" [ngClass]="{'even': $index % 2 == 1}">
                    <div style="font-size: .5em; padding: .25em .25em 0 .25em;">
                        <div (click)="pouleClicked($index)">
                            <app-ronde-poule-view [poule]="poule" [allowDelete]="false" [koppelView]="'poule-uitslag'"
                                                [koppelClick]="false" [selected]="$index == idxPoule"></app-ronde-poule-view>
                        </div>
                    </div>
                </div>
            }
        </div>
    </div>
    <div class="flexbox flexcenter flexmiddle" style="min-height: 3em;">
        <div>
            <app-button [button]="btnWeds" [disabled]="idxPoule < 0" (btnClicked)="naarPouleClicked()"></app-button>
        </div>
    </div>
</div>
