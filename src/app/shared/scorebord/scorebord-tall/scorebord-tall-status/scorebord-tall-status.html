<div class="speler-voortgang-container" style="height: 2.5em; position: relative;">
    <div class="fullheight flexbox flexstretch">
        @if (position == 'left') {
            <div style="line-height: 1.5em; padding-right: .5em; color: #93cf95;">
                <span style="font-size: 1.5em;">{{beurten}} BRT</span>
            </div>
            <div class="flexgrow1" style="position: relative;">
                <div class="fullheight" style="background-color: #6ec071; border-radius: .75em; overflow: hidden;">
                    <div class="fullheight speler-voortgang" [style.width]="voortgang + '%'"></div>
                </div>
                <div class="speler-voortgang-perc" style="top: 0;">
                    <span style="font-size: 1.5em;">{{voortgang}}</span>
                    <span style="position: relative; top: -.125em;"> %</span>
                </div>
            </div>
        }
        @else {
            <div class="flexgrow1" style="position: relative;">
                <div class="fullheight" style="background-color: #6ec071; border-radius: .75em; overflow: hidden;">
                    <div class="fullheight speler-voortgang" [style.width]="voortgang + '%'"></div>
                </div>
                <div class="speler-voortgang-perc" style="top: 0;">
                    <span style="font-size: 1.5em;">{{voortgang}}</span>
                    <span style="position: relative; top: -.125em;"> %</span>
                </div>
            </div>
            <div style="line-height: 1.5em; padding-left: .5em; color: #93cf95;">
                <span style="font-size: 1.5em;">{{beurten}} BRT</span>
            </div>
        }
    </div>
</div>
