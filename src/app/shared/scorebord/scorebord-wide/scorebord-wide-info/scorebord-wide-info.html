<div class="flexbox flexmiddle" style="height: 6.75em;">
    @if (position == 'left') {
        <div class="arial" style="width: 14em; height: 5em; line-height: 1;">
            <span style="font-size: 4.5em;">{{moyenne | number:'1.3-3':'nl-NL'}}</span>
        </div>
        <div class="flexgrow1" style="overflow: hidden; padding-right: 1em; padding-top: .5em; line-height: 6em; white-space: nowrap; text-align: right;">
            <span style="font-size: 5.5em;">{{naam}}</span>
        </div>
    }
    @else {
        <div class="flexgrow1" style="overflow: hidden; padding-left: .5em; padding-top: .5em; line-height: 6em; white-space: nowrap;">
            <span style="font-size: 5.5em;">{{naam}}</span>
        </div>
        <div class="arial" style="width: 14em; height: 5em; line-height: 1; padding-right: .5em; text-align: right;">
            <span style="font-size: 4.5em;">{{moyenne | number:'1.3-3':'nl-NL'}}</span>
        </div>
    }
</div>
