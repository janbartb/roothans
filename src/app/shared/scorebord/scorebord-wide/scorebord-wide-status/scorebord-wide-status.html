<div style="height: 3em; background-color: #1e461f;">
    <div style="height: 3em; padding: 1em 1em 0 1em; position: relative">
        <div class="fullheight" style="background-color: #6ec071; border-radius: 1em; overflow: hidden;">
            <div class="fullheight speler-voortgang" [style.width]="voortgang + '%'"></div>
        </div>
        <div class="speler-voortgang-perc wide">
            <span style="font-size: 2em;">{{voortgang}}</span>
            <span style="font-size: 1.5em; position: relative; top: -.125em;"> %</span>
        </div>
    </div>
</div>
