<div class="flexbox" style="border: .25em solid #dbefdc;">
    <app-scorebord-speler [speler]="speler"
                        [maxBrt]="wedstrijd.regels.maxBeurten"
                        [showPunten]="wedstrijd.telling.idxOptie == 0"
                        [oldPunten]="oldPunten[0]"
                        [wedOver]="wedstrijd.wedGespeeld"
                        [isVijfde]="wedstrijd.regels.idxOptie == 4 && wedstrijd.aantSpelers < 5"
                        [position]="'left'"></app-scorebord-speler>
    <app-scorebord-speler [speler]="tegenstander"
                        [maxBrt]="wedstrijd.regels.maxBeurten"
                        [showPunten]="wedstrijd.telling.idxOptie == 0"
                        [oldPunten]="oldPunten[1]"
                        [wedOver]="wedstrijd.wedGespeeld"
                        [isVijfde]="wedstrijd.regels.idxOptie == 4 && wedstrijd.aantSpelers < 5"
                        [position]="'right'"></app-scorebord-speler>
</div>
