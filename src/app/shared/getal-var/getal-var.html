<div class="flexbox flexright getal-container" [ngClass]="{'arial-nw': narrow}" [style.width]="getalWidth + 'em'">
    @for (cijfer of cijfers; track $index) {
        @if (cijfer == ',') {
            <div class="komma" [style.width]="kommaWidth + 'em'"><span>,</span></div>
        }
        @else {
            <app-cijfer [cijfer]="cijfer" [moveUp]="moveUp" [cijferWidth]="cijferWidth"></app-cijfer>
        }
    }
</div>
